<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Filter Button</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #202020;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      min-height: 100vh;
      font-family: 'Geist', 'Inter', sans-serif;
    }

    .filter-btn {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      width: 121.6px;
      height: 97px;
      padding: 24px 8px;
      border-radius: 16px;
      border: 0.5px solid transparent;
      background: #434343;
      box-shadow: 0px 2px 10px 0px rgba(0,0,0,0.05);
      cursor: pointer;
      user-select: none;
    }

    /* Hover */
    .filter-btn:hover {
      border-color: #606060;
    }

    .filter-btn:hover .filter-icon {
      background: #fff679;
      filter: drop-shadow(0px 0px 8px rgba(255,246,121,0.6));
    }

    .filter-btn:hover .filter-label {
      color: #fff679;
    }

    /* Selected */
    .filter-btn.selected {
      background: #191919;
      border-color: #706f62;
      box-shadow: 0px 4px 12px 0px rgba(0,0,0,0.15);
    }

    .filter-btn.selected .filter-icon {
      background: #fff679;
      filter: drop-shadow(0px 0px 8px rgba(255,246,121,0.6));
    }

    .filter-btn.selected .filter-label {
      color: #fff679;
      text-shadow: 0px 0px 15px rgba(255,246,121,0.5);
    }

    /* Inner corner shadows on selected */
    .filter-btn.selected::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      box-shadow:
        inset -8px -8px 12px 0px rgba(19,19,19,0.16),
        inset  8px  8px 12px 0px rgba(19,19,19,0.16);
      pointer-events: none;
    }

    /* Icon — color set via background, shape via mask */
    .filter-icon {
      width: 24px;
      height: 24px;
      flex-shrink: 0;
      background: #c7c7c7;
      mask: var(--icon) no-repeat center / contain;
      -webkit-mask: var(--icon) no-repeat center / contain;
      transition: background 0.15s, filter 0.15s;
    }

    .filter-label {
      color: #c7c7c7;
      font-size: 16px;
      font-weight: 400;
      white-space: nowrap;
      transition: color 0.15s, text-shadow 0.15s;
    }
  </style>
</head>
<body>

<div class="filter-btn" data-icon="vignette">
  <div class="filter-icon"></div>
  <span class="filter-label">Vignette</span>
</div>

<script>
  // Resolve icon paths and wire up click-to-toggle
  document.querySelectorAll('.filter-btn').forEach(btn => {
    const name = btn.dataset.icon;
    const icon = btn.querySelector('.filter-icon');
    icon.style.setProperty('--icon', `url('icons/${name}.svg')`);

    btn.addEventListener('click', () => {
      btn.classList.toggle('selected');
    });
  });
</script>
</body>
</html>
