<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shape Selector</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #202020;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Geist', 'Inter', sans-serif;
    }

    .widget {
      display: flex;
      flex-direction: column;
      gap: 6px;
      width: 360px;
    }

    .label {
      color: #c7c7c7;
      font-size: 14px;
      font-weight: 500;
    }

    .selector {
      position: relative;
      background: #141414;
      border: 0.5px solid #262626;
      border-radius: 8px;
      padding: 8px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      user-select: none;
    }

    .selector-left {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .option-icon {
      width: 16px;
      height: 16px;
      display: block;
      flex-shrink: 0;
      filter: brightness(0) invert(78%);
    }

    .option-text {
      color: #c7c7c7;
      font-size: 16px;
      font-weight: 400;
    }

    .chevron {
      width: 24px;
      height: 24px;
      display: block;
      flex-shrink: 0;
      transition: transform 0.18s ease;
    }

    .selector.open .chevron {
      transform: rotate(180deg);
    }

    .dropdown {
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      right: 0;
      background: #141414;
      border: 0.5px solid #262626;
      border-radius: 8px;
      overflow: hidden;
      z-index: 10;
      display: none;
    }

    .selector.open .dropdown {
      display: block;
    }

    .dropdown-item {
      padding: 8px;
      display: flex;
      align-items: center;
      gap: 4px;
      cursor: pointer;
    }

    .dropdown-item:hover {
      background: #1c1c1c;
    }

    .dropdown-item.active {
      background: #1a1a1a;
    }

    .dropdown-item-text {
      color: #c7c7c7;
      font-size: 16px;
      font-weight: 400;
    }
  </style>
</head>
<body>

<div class="widget">
  <span class="label">Shape</span>

  <div class="selector" id="selector">
    <div class="selector-left">
      <img class="option-icon" id="selectedIcon" src="" alt="" />
      <span class="option-text" id="selectedText"></span>
    </div>
    <img class="chevron" src="icons/chevron-down.svg" alt="" />

    <div class="dropdown" id="dropdown">
      <div class="dropdown-item" data-value="wave">
        <img class="option-icon" src="icons/haptic.svg" alt="" />
        <span class="dropdown-item-text">Wave</span>
      </div>
      <div class="dropdown-item" data-value="zigzag">
        <img class="option-icon" src="icons/zigzag.svg" alt="" />
        <span class="dropdown-item-text">Zigzag</span>
      </div>
    </div>
  </div>
</div>

<script>
  const selector     = document.getElementById('selector');
  const selectedIcon = document.getElementById('selectedIcon');
  const selectedText = document.getElementById('selectedText');
  const dropdown     = document.getElementById('dropdown');
  const items        = dropdown.querySelectorAll('.dropdown-item');

  const options = {
    wave:   { label: 'Wave',   icon: 'icons/haptic.svg' },
    zigzag: { label: 'Zigzag', icon: 'icons/zigzag.svg' },
  };

  let selected = 'wave';

  function applySelection(value) {
    selected = value;
    selectedIcon.src = options[value].icon;
    selectedText.textContent = options[value].label;
    items.forEach(item => item.classList.toggle('active', item.dataset.value === value));
  }

  function closeDropdown() {
    selector.classList.remove('open');
  }

  selector.addEventListener('click', (e) => {
    if (e.target.closest('.dropdown-item')) return;
    selector.classList.toggle('open');
  });

  items.forEach(item => {
    item.addEventListener('click', () => {
      applySelection(item.dataset.value);
      closeDropdown();
    });
  });

  document.addEventListener('click', (e) => {
    if (!selector.contains(e.target)) closeDropdown();
  });

  applySelection('wave');
</script>
</body>
</html>
