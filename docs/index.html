    <script>
      // Restore path after GitHub Pages 404 redirect
      (function () {
        var redirect = sessionStorage.redirect;
        delete sessionStorage.redirect;
        if (redirect && redirect !== location.href) {
          history.replaceState(null, null, redirect);
        }
      })();
    </script>
    <script>
      // Register service worker that injects COOP/COEP headers so
      // SharedArrayBuffer is available (required by ffmpeg.wasm).
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("/coi-serviceworker.js").then(
          function (reg) {
            // First activation requires a reload so the SW can intercept all fetches.
            if (!navigator.serviceWorker.controller) {
              window.location.reload();
            }
          }
        );
      }
    </script>
