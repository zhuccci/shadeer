<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Neuroshade</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="components/Button/Button.css" />
  <link rel="stylesheet" href="components/Checkbox/Checkbox.css" />
  <link rel="stylesheet" href="components/ColorSelector/ColorSelector.css" />
  <link rel="stylesheet" href="components/Slider/Slider.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0e0e0e;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      min-height: 100vh;
      padding: 40px 20px;
      font-family: 'Geist', 'Inter', system-ui, sans-serif;
    }

    /* ── App shell ─────────────────────────────────────────────── */
    .app {
      width: 672px;
      border: 0.5px solid #606060;
      border-radius: 24px;
      background: linear-gradient(to right, #373737 82.365%, #202020 182.37%);
      box-shadow: 0px 4px 4px 0px rgba(0,0,0,0.25);
      overflow: hidden;
      position: relative;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ───────────────────────────────────────────────── */
    .app-shadow-overlay {
      position: absolute;
      inset: -0.5px;
      border-radius: 24px;
      pointer-events: none;
      box-shadow: inset 0px 0px 40px 0px rgba(0,0,0,0.68);
    }

    .header {
      padding: 24px;
    }


    .header svg { display: block; }

    /* ── Image area ───────────────────────────────────────────── */
    .image-area {
      width: 672px;
      height: 378px;
      border-top: 0.5px solid #5d5d5d;
      border-bottom: 0.5px solid #5d5d5d;
      box-shadow: 0 4px 20px 0 rgba(0,0,0,0.1);
      overflow: hidden;
      position: relative;
      background: #1a1a1a;
    }

    .image-area.has-image.fill-mode { cursor: grab; }
    .image-area.has-image.fill-mode.dragging-img { cursor: grabbing; }

    .image-area::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, #000000 0%, rgba(0,0,0,0) 100%);
      pointer-events: none;
      z-index: 1;
    }

    .image-area.has-image::after {
      display: none;
    }

    .upload-btn {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
    }
    .upload-btn:hover { transform: translate(-50%, calc(-50% - 1px)); }
    .upload-btn:active { transform: translate(-50%, calc(-50% + 1px)); }

    /* ── Fit/Fill control ─────────────────────────────────────── */
    .fit-control {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px;
      background: rgba(10, 10, 10, 0.35);
      border-radius: 56px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0px 4px 24px 0px rgba(0, 0, 0, 0.5), inset 0px 1px 0px rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(20px) saturate(1.4);
      z-index: 2;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
      white-space: nowrap;
    }

    .image-area.has-image:hover .fit-control {
      opacity: 1;
      pointer-events: auto;
    }

    .fit-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px 24px;
      border-radius: 32px;
      font-family: 'Geist', 'Inter', system-ui, sans-serif;
      font-size: 14px;
      font-weight: 400;
      cursor: pointer;
      user-select: none;
      border: 1px solid rgba(255, 255, 255, 0.1);
      position: relative;
      background: linear-gradient(160deg, rgba(255,255,255,0.10) 0%, rgba(255,255,255,0.03) 50%, rgba(0,0,0,0.10) 100%);
      box-shadow:
        0px 2px 8px rgba(0, 0, 0, 0.4),
        inset 0px 1px 0px rgba(255, 255, 255, 0.18),
        inset 0px -1px 0px rgba(0, 0, 0, 0.2);
      backdrop-filter: blur(12px);
      color: rgba(220, 220, 220, 0.85);
      transition: color 0.15s ease, background 0.15s ease, border-color 0.15s ease, box-shadow 0.15s ease;
    }

    .fit-btn.selected {
      background: rgba(10, 10, 10, 0.7);
      border-color: #fff679;
      color: #fff679;
      box-shadow: 0 0 0 1px rgba(255, 246, 121, 0.15), inset 0px 1px 0px rgba(255, 246, 121, 0.08);
      backdrop-filter: blur(12px);
    }


    /* ── Component area ───────────────────────────────────────── */
    .component-area {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* ── Filter buttons ───────────────────────────────────────── */
    .filter-buttons {
      display: flex;
      gap: 16px;
    }

    .filter-btn {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      flex: 1;
      padding: 16px 8px;
      border-radius: 16px;
      border: 0.5px solid transparent;
      background: linear-gradient(180deg, #505050 0%, #434343 100%);
      box-shadow: 0px 2px 8px 0px rgba(0,0,0,0.4), inset 0px 4px 6px 0px rgba(255,255,255,0.15);
      cursor: pointer;
      user-select: none;
      transition: background 0.2s ease-out, border-color 0.2s ease-out, box-shadow 0.2s ease-out, transform 0.15s ease-out;
    }

    .filter-btn:hover {
      background: linear-gradient(180deg, #5a5a5a 0%, #4a4a4a 100%);
      border-color: #606060;
      box-shadow: 0px 4px 14px rgba(0, 0, 0, 0.5), inset 0px 4px 6px rgba(255, 255, 255, 0.18);
      transform: translateY(-1px);
    }
    .filter-btn:active {
      background: #1b1b1b;
      border-color: rgba(255, 246, 121, 0.4);
      box-shadow: inset 0px 0px 12px 0px #141414;
      transform: translateY(1px);
    }
    .filter-btn:hover .filter-icon { color: #fff679; filter: drop-shadow(0 0 8px rgba(255,246,121,0.6)); }
    .filter-btn:hover .filter-label { color: #fff679; }

    .filter-btn.selected {
      background: #1b1b1b;
      border-color: #fff679;
      box-shadow: none;
    }
    .filter-btn.selected:hover { transform: none; }
    .filter-btn.selected .filter-icon { color: #fff679; filter: drop-shadow(0 0 8px rgba(255,246,121,0.6)); }
    .filter-btn.selected .filter-label { color: #fff679; text-shadow: 0 0 15px rgba(255,246,121,0.5); }

    .filter-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      box-shadow: inset -8px -8px 12px 0 rgba(19,19,19,0.16), inset 8px 8px 12px 0 rgba(19,19,19,0.16);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s ease-out;
    }
    .filter-btn.selected::after { opacity: 1; }

    .filter-icon {
      width: 24px;
      height: 24px;
      flex-shrink: 0;
      color: #c7c7c7;
      transition: color 0.2s ease-out, filter 0.2s ease-out;
    }
    .filter-icon svg { display: block; width: 100%; height: 100%; }

    .filter-label {
      color: #c7c7c7;
      font-size: 16px;
      font-weight: 400;
      white-space: nowrap;
      transition: color 0.2s ease-out, text-shadow 0.2s ease-out;
    }

    /* ── Controls panel ───────────────────────────────────────── */
    #panelWrapper {
      overflow: hidden;
      position: relative;
      transition: height 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .controls-panel {
      transition: opacity 0.35s ease;
    }

    .controls-panel {
      background: #202020;
      border: 0.5px solid #494949;
      border-radius: 16px;
      padding: 24px;
      display: flex;
      gap: 24px;
      align-items: flex-start;
      box-shadow: inset 0px 0px 40px 0px rgba(0,0,0,0.5);
    }

    /* ── Left column ──────────────────────────────────────────── */
    .controls-left {
      display: flex;
      flex-direction: column;
      gap: 16px;
      flex: 1;
      min-width: 0;
    }

    /* ── Shape selector ───────────────────────────────────────── */
    .widget-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .widget-label {
      color: #d6d6d6;
      font-size: 16px;
      font-weight: 500;
    }

    .selector {
      position: relative;
      background: #141414;
      border: 0.5px solid #262626;
      border-radius: 8px;
      padding: 8px 8px 8px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      user-select: none;
      transition: border-color 0.2s ease-out, background 0.2s ease-out;
    }

    .selector-left {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .option-icon {
      width: 16px;
      height: 16px;
      display: block;
      flex-shrink: 0;
      filter: brightness(0) invert(78%);
    }
    .option-icon svg { display: block; width: 100%; height: 100%; }

    .option-text {
      color: #d6d6d6;
      font-size: 16px;
      font-weight: 400;
    }

    .chevron {
      width: 24px;
      height: 24px;
      display: block;
      flex-shrink: 0;
      transition: transform 0.18s ease;
    }

    .selector.open .chevron { transform: rotate(180deg); }

    .dropdown {
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      right: 0;
      background: #141414;
      border: 0.5px solid #262626;
      border-radius: 8px;
      overflow: hidden;
      z-index: 10;
      display: none;
      padding: 8px;
    }

    .selector.open .dropdown { display: block; }

    .dropdown-item {
      padding: 4px 4px 4px 8px;
      display: flex;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      border-radius: 4px;
    }

    .dropdown-item:hover { background: #1c1c1c; }
    .dropdown-item.active { background: #1a1a1a; }

    .dropdown-item-text {
      color: #c7c7c7;
      font-size: 16px;
      font-weight: 400;
    }

    /* ── Input row (hover container) ──────────────────────────── */
    .input-row {
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 8px;
      border-radius: 8px;
      background: transparent;
      transition: background 0.2s ease-out;
    }

    .input-row:hover { background: rgba(20,20,20,0.3); }

    /* ── Slider ───────────────────────────────────────────────── */
    .slider-row {
      display: flex;
      gap: 16px;
      align-items: center;
      padding: 8px;
      border-radius: 8px;
      background: transparent;
      transition: background 0.2s ease-out;
    }

    .slider-row:hover { background: rgba(20,20,20,0.3); }

    .slider-container {
      display: flex;
      flex-direction: column;
      gap: 4px;
      flex: 1;
      min-width: 0;
    }

    .slider-label {
      color: #d6d6d6;
      font-size: 16px;
      font-weight: 500;
    }

    .slider-track {
      display: flex;
      align-items: center;
      width: 100%;
      user-select: none;
    }

    .track-fill {
      height: 6px;
      border-radius: 40px 0 0 40px;
      flex-shrink: 0;
      background: #fff679;
      width: 0;
    }

    .slider-thumb {
      width: 6px;
      height: 12px;
      border-radius: 4px;
      flex-shrink: 0;
      background: #fff679;
      box-shadow: -2px 0 8px 0 rgba(0,0,0,0.25);
      position: relative;
      z-index: 1;
    }

    .track-empty {
      height: 6px;
      border-radius: 0 40px 40px 0;
      background: #6a6a6a;
      flex: 1;
      min-width: 0;
    }

    .value-display {
      background: #141414;
      border: 0.5px solid #262626;
      border-radius: 8px;
      padding: 8px 16px;
      color: #c7c7c7;
      font-size: 16px;
      font-weight: 500;
      width: 62px;
      height: 40px;
      text-align: center;
      outline: none;
      font-family: inherit;
      flex-shrink: 0;
      transition: border-color 0.2s ease-out, box-shadow 0.2s ease-out, transform 0.2s ease-out, background 0.2s ease-out;
    }
    .value-display { cursor: ew-resize; }
    .value-display:hover { border-color: #484848; background: #1c1c1c; }
    .value-display:focus {
      border-color: #686868;
      background: #1e1e1e;
      transform: scale(1.02);
      cursor: text;
    }
    .value-display:active { transform: scale(1.03); }

    /* ── Right column — knob ──────────────────────────────────── */
    .controls-right {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 4px;
      width: 160px;
      flex-shrink: 0;
    }

    .dial-wrap { margin-top: 16px; }

    .knob-value-display { margin-top: 8px; }

    .knob-label {
      color: #c7c7c7;
      font-size: 16px;
      font-weight: 400;
    }

    .dial-wrap {
      position: relative;
      width: 152px;
      height: 132px;
    }

    .deg-top, .deg-bottom {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      font-size: 10px;
      line-height: 1;
      color: #595959;
      text-align: center;
      white-space: nowrap;
      user-select: none;
    }
    .deg-top { top: 2px; padding-left: 4px; }
    .deg-bottom { bottom: 2px; }

    .deg-left, .deg-right {
      position: absolute;
      font-size: 10px;
      color: #595959;
      top: 66px;
      transform: translateY(-50%);
      text-align: center;
      user-select: none;
      width: 22px;
    }
    .deg-left { left: 0; }
    .deg-right { left: 130px; }

    .knob-area {
      position: absolute;
      left: 26px;
      top: 16px;
      width: 100px;
      height: 100px;
    }

    .knob {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      border: 0.625px solid #262626;
      background: radial-gradient(circle at center, #202020 0%, #191919 100%);
      position: relative;
      cursor: grab;
      user-select: none;
    }
    .knob:active { cursor: grabbing; }

    @property --kf-top    { syntax: '<color>'; inherits: false; initial-value: #656565; }
    @property --kf-bottom { syntax: '<color>'; inherits: false; initial-value: #515151; }

    .knob-face {
      position: absolute;
      width: 80px; height: 80px;
      left: 10px; top: 10px;
      border-radius: 50%;
      --kf-top: #656565;
      --kf-bottom: #515151;
      background: linear-gradient(to bottom, var(--kf-top), var(--kf-bottom));
      box-shadow: 0 1px 1px rgba(255,255,255,0.04), inset 0 2.5px 6.25px rgba(255,255,255,0.1);
      pointer-events: none;
      transition: --kf-top 0.2s ease-out, --kf-bottom 0.2s ease-out;
    }
    .knob:hover .knob-face { --kf-top: #828282; --kf-bottom: #535353; }
    .knob.dragging .knob-face { --kf-top: #4F4F4F; --kf-bottom: #393939; }

    .tick {
      position: absolute;
      border-radius: 20px;
      pointer-events: none;
    }

    .indicator {
      position: absolute;
      width: 7.5px;
      height: 7.5px;
      background: #fff679;
      border-radius: 50%;
      box-shadow: 0 0 18.75px 6.25px rgba(255,246,121,0.2);
      pointer-events: none;
    }

    .knob-value-display {
      background: #141414;
      border: 0.5px solid #262626;
      border-radius: 8px;
      padding: 8px 10px 8px 14px;
      color: #c7c7c7;
      font-size: 16px;
      font-weight: 500;
      width: 62px;
      height: 40px;
      text-align: center;
      outline: none;
      font-family: inherit;
      transition: border-color 0.2s ease-out, box-shadow 0.2s ease-out, transform 0.2s ease-out, background 0.2s ease-out;
    }
    .knob-value-display:hover { border-color: #484848; background: #1c1c1c; }
    .knob-value-display:focus {
      border-color: #686868;
      background: #1e1e1e;
      transform: scale(1.02);
    }
    .knob-value-display:active { transform: scale(1.03); }

    /* ── Action bar ───────────────────────────────────────────── */
    .action-bar {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 16px;
      padding: 0 16px;
      max-height: 0;
      overflow: hidden;
      opacity: 0;
      transform: translateY(6px);
      transition: max-height 0.35s cubic-bezier(0.4, 0, 0.2, 1),
                  padding  0.35s cubic-bezier(0.4, 0, 0.2, 1),
                  opacity  0.25s ease 0.1s,
                  transform 0.3s ease 0.05s;
    }
    .action-bar.visible {
      max-height: 72px;
      padding: 0 16px 16px;
      opacity: 1;
      transform: translateY(0);
      overflow: visible;
    }

    /* ── Panel divider ───────────────────────────────────────── */
    .panel-divider {
      width: 0.5px;
      background: #2B2B2B;
      align-self: stretch;
      flex-shrink: 0;
    }

    /* ── Dithering panel ──────────────────────────────────────── */
    #ditheringPanel { gap: 32px; }

    #ditheringPanel .widget-label { font-size: 14px; }
    #ditheringPanel .slider-label { font-size: 14px; }
    #ditheringPanel .checkbox-label { font-size: 14px; font-weight: 500; }
    #ditheringPanel .checkbox-row { gap: 8px; padding: 8px; }

    #ditheringPanel .controls-left {
      flex: none;
      width: fit-content;
    }

    .dither-right {
      display: flex;
      flex-direction: column;
      gap: 16px;
      flex: 1;
      min-width: 0;
    }

    .dither-type-section {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .dither-type-row {
      display: flex;
      gap: 16px;
      align-items: flex-start;
    }

    .dither-type-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 8px;
      border-radius: 8px;
      transition: background 0.15s ease-out;
    }
    .dither-type-item:hover { background: rgba(20,20,20,0.3); }
    .dither-type-btn {
      width: 56px;
      height: 56px;
      border-radius: 8px;
      background: #141414;
      border: 0.5px solid #6a6a6a;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      color: #6a6a6a;
      transition: border-color 0.15s ease-out, box-shadow 0.15s ease-out, color 0.15s ease-out;
    }
    .dither-type-btn:hover { border-color: #d9d9d9; color: #d9d9d9; }
    .dither-type-btn.selected {
      border-color: #fff679;
      color: #fff679;
      box-shadow: 0 0 18.75px 0px rgba(255, 246, 121, 0.2);
    }

    .dither-type-label {
      font-size: 14px;
      font-weight: 500;
      color: #d9d9d9;
      white-space: nowrap;
      transition: color 0.15s ease-out;
    }
    .dither-type-label.selected { color: #fff679; }

    .dither-slider-section {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }
  </style>
</head>
<body>

<script>
  // ── Paper Shaders (inlined — works from file://) ──────────────

  const vertexShaderSource = `#version 300 es
precision mediump float;
layout(location = 0) in vec4 a_position;
uniform vec2 u_resolution;
uniform float u_pixelRatio;
uniform float u_imageAspectRatio;
uniform float u_originX;
uniform float u_originY;
uniform float u_worldWidth;
uniform float u_worldHeight;
uniform float u_fit;
uniform float u_scale;
uniform float u_rotation;
uniform float u_offsetX;
uniform float u_offsetY;
out vec2 v_objectUV;
out vec2 v_objectBoxSize;
out vec2 v_responsiveUV;
out vec2 v_responsiveBoxGivenSize;
out vec2 v_patternUV;
out vec2 v_patternBoxSize;
out vec2 v_imageUV;
vec3 getBoxSize(float boxRatio, vec2 givenBoxSize) {
  vec2 box = vec2(0.);
  box.x = boxRatio * min(givenBoxSize.x / boxRatio, givenBoxSize.y);
  float noFitBoxWidth = box.x;
  if (u_fit == 1.) { box.x = boxRatio * min(u_resolution.x / boxRatio, u_resolution.y); }
  else if (u_fit == 2.) { box.x = boxRatio * max(u_resolution.x / boxRatio, u_resolution.y); }
  box.y = box.x / boxRatio;
  return vec3(box, noFitBoxWidth);
}
void main() {
  gl_Position = a_position;
  vec2 uv = gl_Position.xy * .5;
  vec2 boxOrigin = vec2(.5 - u_originX, u_originY - .5);
  vec2 givenBoxSize = max(vec2(u_worldWidth, u_worldHeight), vec2(1.)) * u_pixelRatio;
  float r = u_rotation * 3.14159265358979323846 / 180.;
  mat2 graphicRotation = mat2(cos(r), sin(r), -sin(r), cos(r));
  vec2 graphicOffset = vec2(-u_offsetX, u_offsetY);
  vec2 fixedRatioBoxGivenSize = vec2(
    (u_worldWidth == 0.) ? u_resolution.x : givenBoxSize.x,
    (u_worldHeight == 0.) ? u_resolution.y : givenBoxSize.y);
  v_objectBoxSize = getBoxSize(1., fixedRatioBoxGivenSize).xy;
  vec2 objectWorldScale = u_resolution.xy / v_objectBoxSize;
  v_objectUV = uv * objectWorldScale + boxOrigin * (objectWorldScale - 1.) + graphicOffset;
  v_objectUV /= u_scale;
  v_objectUV = graphicRotation * v_objectUV;
  v_responsiveBoxGivenSize = vec2(
    (u_worldWidth == 0.) ? u_resolution.x : givenBoxSize.x,
    (u_worldHeight == 0.) ? u_resolution.y : givenBoxSize.y);
  float responsiveRatio = v_responsiveBoxGivenSize.x / v_responsiveBoxGivenSize.y;
  vec2 responsiveBoxSize = getBoxSize(responsiveRatio, v_responsiveBoxGivenSize).xy;
  vec2 responsiveBoxScale = u_resolution.xy / responsiveBoxSize;
  v_responsiveUV = uv * responsiveBoxScale + boxOrigin * (responsiveBoxScale - 1.) + graphicOffset;
  v_responsiveUV /= u_scale;
  v_responsiveUV.x *= responsiveRatio;
  v_responsiveUV = graphicRotation * v_responsiveUV;
  v_responsiveUV.x /= responsiveRatio;
  vec2 patternBoxGivenSize = vec2(
    (u_worldWidth == 0.) ? u_resolution.x : givenBoxSize.x,
    (u_worldHeight == 0.) ? u_resolution.y : givenBoxSize.y);
  float patternBoxRatio = patternBoxGivenSize.x / patternBoxGivenSize.y;
  vec3 boxSizeData = getBoxSize(patternBoxRatio, patternBoxGivenSize);
  v_patternBoxSize = boxSizeData.xy;
  float patternBoxNoFitBoxWidth = boxSizeData.z;
  vec2 patternBoxScale = u_resolution.xy / v_patternBoxSize;
  v_patternUV = uv + graphicOffset / patternBoxScale + boxOrigin - boxOrigin / patternBoxScale;
  v_patternUV *= u_resolution.xy / u_pixelRatio;
  if (u_fit > 0.) { v_patternUV *= (patternBoxNoFitBoxWidth / v_patternBoxSize.x); }
  v_patternUV /= u_scale;
  v_patternUV = graphicRotation * v_patternUV;
  v_patternUV += boxOrigin / patternBoxScale - boxOrigin;
  v_patternUV *= .01;
  vec2 imageBoxSize;
  if (u_fit == 1.) { imageBoxSize.x = min(u_resolution.x / u_imageAspectRatio, u_resolution.y) * u_imageAspectRatio; }
  else if (u_fit == 2.) { imageBoxSize.x = max(u_resolution.x / u_imageAspectRatio, u_resolution.y) * u_imageAspectRatio; }
  else { imageBoxSize.x = min(10.0, 10.0 / u_imageAspectRatio * u_imageAspectRatio); }
  imageBoxSize.y = imageBoxSize.x / u_imageAspectRatio;
  vec2 imageBoxScale = u_resolution.xy / imageBoxSize;
  v_imageUV = uv * imageBoxScale + boxOrigin * (imageBoxScale - 1.) + graphicOffset;
  v_imageUV /= u_scale;
  v_imageUV.x *= u_imageAspectRatio;
  v_imageUV = graphicRotation * v_imageUV;
  v_imageUV.x /= u_imageAspectRatio;
  v_imageUV += .5;
  v_imageUV.y = 1. - v_imageUV.y;
}`;

  const _declarePI = `
#define TWO_PI 6.28318530718
#define PI 3.14159265358979323846
`;
  const _rotation2 = `
vec2 rotate(vec2 uv, float th) {
  return mat2(cos(th), sin(th), -sin(th), cos(th)) * uv;
}
`;
  const _hash21 = `
  float hash21(vec2 p) {
    p = fract(p * vec2(0.3183099, 0.3678794)) + 0.1;
    p += dot(p, p + 19.19);
    return fract(p.x * p.y);
  }
`;

  const flutedGlassFragmentShader = `#version 300 es
precision mediump float;
uniform vec2 u_resolution;
uniform float u_pixelRatio;
uniform float u_rotation;
uniform vec4 u_colorBack;
uniform vec4 u_colorShadow;
uniform vec4 u_colorHighlight;
uniform sampler2D u_image;
uniform float u_imageAspectRatio;
uniform float u_size;
uniform float u_shadows;
uniform float u_angle;
uniform float u_stretch;
uniform float u_shape;
uniform float u_distortion;
uniform float u_highlights;
uniform float u_distortionShape;
uniform float u_shift;
uniform float u_blur;
uniform float u_edges;
uniform float u_marginLeft;
uniform float u_marginRight;
uniform float u_marginTop;
uniform float u_marginBottom;
uniform float u_grainMixer;
uniform float u_grainOverlay;
in vec2 v_imageUV;
out vec4 fragColor;
${_declarePI}
${_rotation2}
${_hash21}
float valueNoise(vec2 st) {
  vec2 i = floor(st); vec2 f = fract(st);
  float a = hash21(i); float b = hash21(i + vec2(1.0, 0.0));
  float c = hash21(i + vec2(0.0, 1.0)); float d = hash21(i + vec2(1.0, 1.0));
  vec2 u = f * f * (3.0 - 2.0 * f);
  return mix(mix(a, b, u.x), mix(c, d, u.x), u.y);
}
float getUvFrame(vec2 uv, float softness) {
  float aax = 2. * fwidth(uv.x); float aay = 2. * fwidth(uv.y);
  return smoothstep(0., aax + softness, uv.x) *
         (1. - smoothstep(1. - softness - aax, 1., uv.x)) *
         smoothstep(0., aay + softness, uv.y) *
         (1. - smoothstep(1. - softness - aay, 1., uv.y));
}
const int MAX_RADIUS = 50;
vec4 samplePM(sampler2D tex, vec2 uv) { vec4 c = texture(tex, uv); c.rgb *= c.a; return c; }
vec4 getBlur(sampler2D tex, vec2 uv, vec2 texelSize, vec2 dir, float sigma) {
  if (sigma <= .5) return texture(tex, uv);
  int radius = int(min(float(MAX_RADIUS), ceil(3.0 * sigma)));
  float twoSigma2 = 2.0 * sigma * sigma;
  float gaussianNorm = 1.0 / sqrt(TWO_PI * sigma * sigma);
  vec4 sum = samplePM(tex, uv) * gaussianNorm; float weightSum = gaussianNorm;
  for (int i = 1; i <= MAX_RADIUS; i++) {
    if (i > radius) break;
    float x = float(i); float w = exp(-(x * x) / twoSigma2) * gaussianNorm;
    vec2 offset = dir * texelSize * x;
    sum += (samplePM(tex, uv + offset) + samplePM(tex, uv - offset)) * w;
    weightSum += 2.0 * w;
  }
  vec4 result = sum / weightSum;
  if (result.a > 0.) result.rgb /= result.a;
  return result;
}
vec2 rotateAspect(vec2 p, float a, float aspect) {
  p.x *= aspect; p = rotate(p, a); p.x /= aspect; return p;
}
float smoothFract(float x) {
  float f = fract(x); float w = fwidth(x);
  float edge = abs(f - 0.5) - 0.5;
  return mix(f, 1.0 - f, smoothstep(-w, w, edge));
}
void main() {
  float patternRotation = -u_angle * PI / 180.;
  float patternSize = mix(200., 5., u_size);
  vec2 uv = v_imageUV;
  vec2 uvMask = gl_FragCoord.xy / u_resolution.xy;
  vec2 sw = vec2(.005);
  vec4 margins = vec4(u_marginLeft, u_marginTop, u_marginRight, u_marginBottom);
  float mask =
    smoothstep(margins[0], margins[0] + sw.x, uvMask.x + sw.x) *
    smoothstep(margins[2], margins[2] + sw.x, 1.0 - uvMask.x + sw.x) *
    smoothstep(margins[1], margins[1] + sw.y, uvMask.y + sw.y) *
    smoothstep(margins[3], margins[3] + sw.y, 1.0 - uvMask.y + sw.y);
  float maskOuter =
    smoothstep(margins[0] - sw.x, margins[0], uvMask.x + sw.x) *
    smoothstep(margins[2] - sw.x, margins[2], 1.0 - uvMask.x + sw.x) *
    smoothstep(margins[1] - sw.y, margins[1], uvMask.y + sw.y) *
    smoothstep(margins[3] - sw.y, margins[3], 1.0 - uvMask.y + sw.y);
  float maskStroke = maskOuter - mask;
  float maskInner =
    smoothstep(margins[0] - 2. * sw.x, margins[0], uvMask.x) *
    smoothstep(margins[2] - 2. * sw.x, margins[2], 1.0 - uvMask.x) *
    smoothstep(margins[1] - 2. * sw.y, margins[1], uvMask.y) *
    smoothstep(margins[3] - 2. * sw.y, margins[3], 1.0 - uvMask.y);
  float maskStrokeInner = maskInner - mask;
  vec2 uvImgCentered = uv - .5;
  uv -= .5; uv *= patternSize;
  uv = rotateAspect(uv, patternRotation, u_imageAspectRatio);
  float curve = 0.;
  float patternY = uv.y / u_imageAspectRatio;
  if (u_shape > 5.5)      { vec2 c = uvImgCentered * vec2(u_imageAspectRatio, 1.0); float r = length(c) * patternSize; curve = r - uv.x; }
  else if (u_shape > 4.5) { curve = .5 + .5 * sin(.5 * PI * uv.x) * cos(.5 * PI * patternY); }
  else if (u_shape > 3.5) { curve = 10. * abs(fract(.1 * patternY) - .5); }
  else if (u_shape > 2.5) { curve = 4. * sin(.23 * patternY); }
  else if (u_shape > 1.5) { curve = .5 + .5 * sin(.5 * uv.x) * sin(1.7 * uv.x); }

  float x = smoothFract(UvToFract.x);
  float xNonSmooth = fract(UvToFract.x) + .0001;
  float highlightsWidth = 2. * max(.001, fwidth(UvToFract.x)) + 2. * maskStrokeInner;
  float highlights = 1. - smoothstep(0., highlightsWidth, xNonSmooth) * smoothstep(1., 1. - highlightsWidth, xNonSmooth);
  highlights = clamp(highlights * u_highlights, 0., 1.) * mask;
  float shadows = pow(x, 1.3);
  float distortion = 0.; float fadeX = 1.; float frameFade = 0.;

      this.uniformLocations = {}; this.canvasElement.remove(); delete this.parentElement.paperShaderMount;
    };
  }

  // ── Shader state ──────────────────────────────────────────────────
  let shaderMount = null;
  let shaderSize  = 60;
  let shaderGrain = 0;
  let shaderShape = 'lines';
  let shaderFit   = 2; // 2 = fill, 1 = fit
  let imgOffsetX  = 0;
  let imgOffsetY  = 0;
  let imgAspect   = 1;
  let activeFilter = 'glass'; // 'glass' | 'dithering'

  // Set initial wrapper height so transitions have a baseline
  const panelWrapper = document.getElementById('panelWrapper');
  if (panelWrapper) panelWrapper.style.height = panelWrapper.offsetHeight + 'px';
  // Remove fixed height after a tick so it can grow freely until first switch
  setTimeout(() => { if (panelWrapper) panelWrapper.style.height = ''; }, 0);

  function hexToVec4(hex) {
    const r = parseInt(hex.slice(1,3), 16) / 255;
    const g = parseInt(hex.slice(3,5), 16) / 255;
    const b = parseInt(hex.slice(5,7), 16) / 255;
    return [r, g, b, 1];
  }

  function getDitherUniforms() {
    const selectedBtn = document.querySelector('.dither-type-btn.selected');
    const dtype = selectedBtn ? (DitheringTypes[selectedBtn.dataset.dtype] ?? 2) : 2;
    const pxSize = Math.max(1, parseFloat(document.getElementById('ditherSizeDisplay').value) / 10);
    const colorSteps = Math.max(1, Math.round(parseFloat(document.getElementById('ditherStepsDisplay').value)));
    const originalColors = document.getElementById('originalColorsCheck')?.classList.contains('checked') ?? false;
    const inverted = document.getElementById('invertCheck')?.classList.contains('checked') ?? false;
    const bgHex  = document.getElementById('bgHex')?.value  || '#000000';
    const fgHex  = document.getElementById('fgHex')?.value  || '#ffffff';
    const hlHex  = document.getElementById('hlHex')?.value  || '#fff679';
    return {
      u_colorBack:      hexToVec4(bgHex),
      u_colorFront:     hexToVec4(fgHex),
      u_colorHighlight: hexToVec4(hlHex),
      u_type:           dtype,
      u_pxSize:         pxSize,
      u_originalColors: originalColors,
      u_inverted:       inverted,
      u_colorSteps:     colorSteps,
      u_fit:            shaderFit,
      u_scale:          1,
      u_rotation:       0,
      u_offsetX:        imgOffsetX,
      u_offsetY:        imgOffsetY,
      u_originX:        0.5,
      u_originY:        0.5,
      u_worldWidth:     0,
      u_worldHeight:    0,
    };
  }

  function updateDitherShader() {
    if (!shaderMount || activeFilter !== 'dithering') return;
    shaderMount.setUniforms(getDitherUniforms());
  }

  function initDitherShader(img) {
    imgAspect = img.naturalWidth / img.naturalHeight;
    imgOffsetX = 0; imgOffsetY = 0;
    try {
      shaderMount = new ShaderMount(imageArea, imageDitheringFragmentShader, {
        u_image: img,
        ...getDitherUniforms(),
      });
    } catch(e) {
      console.error('Dither ShaderMount init failed:', e);
    }
  }

  function updateShader() {
    if (!shaderMount || activeFilter !== 'glass') return;
    shaderMount.setUniforms({
      u_angle:      ((angle % 360) + 360) % 360 / 2,
      u_size:       shaderSize / 100,
      u_grainMixer: shaderGrain / 100,
      u_shape:      shaderShape === 'lines' ? GlassGridShapes.lines : shaderShape === 'zigzag' ? GlassGridShapes.zigzag : shaderShape === 'circles' ? GlassGridShapes.circles : GlassGridShapes.wave,
      u_fit:        shaderFit,

  // ── Filter tabs + panel switcher ─────────────────────────────

  function switchPanel(filter) {
    if (activeFilter === filter) return;
    const wrapper = document.getElementById('panelWrapper');
    const currentPanel = document.getElementById(activeFilter + 'Panel');
    const nextPanel = document.getElementById(filter + 'Panel');

    // Lock wrapper at current height
    wrapper.style.height = wrapper.offsetHeight + 'px';

    // Float current panel out of flow so it doesn't affect height measurement
    currentPanel.style.position = 'absolute';
    currentPanel.style.inset = '0';
    currentPanel.style.opacity = '0';

    // Show next panel immediately (provides natural height, starts invisible)
    nextPanel.style.display = 'flex';
    nextPanel.style.opacity = '0';

    // Measure new height, then animate everything in one frame
    const newHeight = nextPanel.offsetHeight;
    requestAnimationFrame(() => {
      wrapper.style.height = newHeight + 'px';
      nextPanel.style.opacity = '1';
    });

    // Clean up after transition
    setTimeout(() => {
      currentPanel.style.display = 'none';
      currentPanel.style.position = '';
      currentPanel.style.inset = '';
      currentPanel.style.opacity = '';
      wrapper.style.height = '';
    }, 420);

    const currentImg = shaderMount ? shaderMount.providedUniforms.u_image : null;
    if (shaderMount) { shaderMount.dispose?.(); shaderMount = null; }
    imageArea.querySelectorAll('canvas').forEach(c => c.remove());

    activeFilter = filter;

  // ── Slider factory ────────────────────────────────────────────
  function makeSlider({ trackEl, fillEl, thumbEl, displayEl, initialValue, min = 0, max = 100, onChange }) {
    const MIN = min, MAX = max;
    const THUMB_W = 6;
    let value = initialValue;
    let dragging = false, hovered = false, pressed = false;
    let dragStartX = 0, dragStartValue = 0;
    let trackWidth = 0;

    function rangeW() {
      trackWidth = trackEl.getBoundingClientRect().width || trackEl.offsetWidth;
      return trackWidth - THUMB_W;
    }

    function clamp(v) { return Math.max(MIN, Math.min(MAX, v)); }

    function thumbColor() {
      if (value === 0)  return '#a6a6a6';
      if (pressed)      return '#9D9635';
      if (hovered)      return '#C7BE44';
      return '#fff679';
    }

    function updateVisuals() {
      const inactive = value === 0;
      const rw = rangeW();
      const norm = value / MAX;
      fillEl.style.background = inactive ? '#6a6a6a' : '#fff679';
      fillEl.style.width = inactive ? '2px' : (norm * rw) + 'px';
      thumbEl.style.background = thumbColor();
      if (dragging || document.activeElement !== displayEl) {
        displayEl.value = Math.round(value).toString();
      }
      onChange?.(value);
    }

    function valueFromClientX(clientX) {
      const rect = trackEl.getBoundingClientRect();
      const x = clientX - rect.left - THUMB_W / 2;
      return clamp((x / rangeW()) * MAX);
    }

    thumbEl.addEventListener('mouseenter', () => { hovered = true;  updateVisuals(); });
    thumbEl.addEventListener('mouseleave', () => { hovered = false; updateVisuals(); });

    thumbEl.addEventListener('mousedown', (e) => {
      e.preventDefault();
      pressed = true; dragging = true;
      dragStartX = e.clientX; dragStartValue = value;
      updateVisuals();
    });

    window.addEventListener('mousemove', (e) => {
      if (!dragging) return;
      const rw = rangeW();
      value = clamp(dragStartValue + ((e.clientX - dragStartX) / rw) * MAX);
      updateVisuals();
    });

    window.addEventListener('mouseup', () => {
      pressed = false; dragging = false;
      updateVisuals();
    });

    trackEl.addEventListener('click', (e) => {
      if (e.target === thumbEl) return;
      value = valueFromClientX(e.clientX);
      updateVisuals();
    });

    trackEl.addEventListener('wheel', (e) => {
      e.preventDefault();
      value = clamp(value - e.deltaY * 0.2);
      updateVisuals();
    }, { passive: false });

    thumbEl.addEventListener('touchstart', (e) => {
      e.preventDefault();
      dragging = true;
      dragStartX = e.touches[0].clientX; dragStartValue = value;
    }, { passive: false });

    window.addEventListener('touchmove', (e) => {
      if (!dragging) return;
      e.preventDefault();
      value = clamp(dragStartValue + ((e.touches[0].clientX - dragStartX) / rangeW()) * MAX);
      updateVisuals();
    }, { passive: false });

    window.addEventListener('touchend', () => { dragging = false; });

    function applyInput() {
      const raw = parseFloat(displayEl.value);
      if (!isNaN(raw)) value = clamp(raw);
      updateVisuals();
    }

    displayEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { applyInput(); displayEl.blur(); }
      if (e.key === 'Escape') { displayEl.blur(); }
    });
    displayEl.addEventListener('blur', applyInput);
    displayEl.addEventListener('focus', () => {
      displayEl.value = Math.round(value).toString();
      displayEl.select();
    });

    // ── Scrub on input field ───────────────────────────────────
    let scrubPending = false, scrubbing = false;
    let scrubStartX = 0, scrubStartValue = 0;

    displayEl.addEventListener('mousedown', (e) => {
      if (e.button !== 0) return;
      e.preventDefault();
      scrubPending = true;
      scrubbing    = false;
      scrubStartX  = e.clientX;
      scrubStartValue = value;
    });

    window.addEventListener('mousemove', (e) => {
      if (!scrubPending && !scrubbing) return;
      const dx = e.clientX - scrubStartX;
      if (!scrubbing && Math.abs(dx) > 3) {
        scrubbing    = true;
        scrubPending = false;
        displayEl.blur();
        document.body.style.cursor = 'ew-resize';
      }
      if (scrubbing) {
        value = clamp(scrubStartValue + dx);
        updateVisuals();
      }
    });

    window.addEventListener('mouseup', () => {
      if (scrubPending) displayEl.focus();
      if (scrubbing)    document.body.style.cursor = '';
      scrubPending = false;
      scrubbing    = false;
    });

    updateVisuals();
  }

  let knobVelocity = 0, knobPrevAngle = 0, knobPrevTime = 0, knobInertiaId = null;

  const ticks = [];
  for (let i = 0; i < TICK_COUNT; i++) {
    const deg = i * TICK_STEP;
    const rad = (deg - 90) * Math.PI / 180;
    const x = Math.cos(rad) * TICK_R;
    const y = Math.sin(rad) * TICK_R;
    const isCardinal = deg % 90 === 0;
    const size = isCardinal ? 2.5 : 2.434;
    const el = document.createElement('div');
    el.className = 'tick';
    el.style.width  = size + 'px';
    el.style.height = size + 'px';
    el.style.left   = (KNOB_R + x - size / 2) + 'px';
    el.style.top    = (KNOB_R + y - size / 2) + 'px';
    knob.appendChild(el);
    ticks.push({ el, deg });
  }

  function updateKnob() {
    const norm   = ((angle % 360) + 360) % 360;
    const indRad = (angle - 90) * Math.PI / 180;
    indicator.style.left = (KNOB_R + Math.cos(indRad) * IND_R - 3.75) + 'px';
    indicator.style.top  = (KNOB_R + Math.sin(indRad) * IND_R - 3.75) + 'px';
    ticks.forEach(({ el, deg }) => {
      el.style.background = deg <= norm ? '#fff679' : '#2b2b2b';
    });
    if (document.activeElement !== knobDisplay)
      knobDisplay.value = Math.round(norm / 2) + '°';
    updateShader();
  }

  function angleFromEvent(e) {
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    return Math.atan2(clientY - knobCenter.y, clientX - knobCenter.x) * 180 / Math.PI + 90;
  }

  function startKnobDrag(e) {
    e.preventDefault();
    if (knobInertiaId) { cancelAnimationFrame(knobInertiaId); knobInertiaId = null; }
    const rect = knob.getBoundingClientRect();
    knobCenter = { x: rect.left + rect.width / 2, y: rect.top + rect.height / 2 };
    knobDragging = true;
    knob.classList.add('dragging');
    dragStartMouseAngle = angleFromEvent(e);
    dragStartKnobAngle  = angle;
    knobVelocity = 0;
    knobPrevAngle = angle;
    knobPrevTime  = performance.now();
  }

  function onKnobDrag(e) {
    if (!knobDragging) return;
    e.preventDefault();
    let delta = angleFromEvent(e) - dragStartMouseAngle;
    if (delta >  180) delta -= 360;
    if (delta < -180) delta += 360;
    const newAngle = ((dragStartKnobAngle + delta) % 360 + 360) % 360;
    const now = performance.now();
    const dt  = now - knobPrevTime;
    if (dt > 0) {
      let d = newAngle - knobPrevAngle;
      if (d >  180) d -= 360;
      if (d < -180) d += 360;
      knobVelocity = d / dt;
    }
    knobPrevAngle = newAngle;
    knobPrevTime  = performance.now();
    angle = newAngle;
    updateKnob();
  }

  function releaseKnobDrag() {
    knobDragging = false;
    knob.classList.remove('dragging');
    if (Math.abs(knobVelocity) < 0.02) return;
    let lastTime = performance.now();
    function step(now) {
      const dt = now - lastTime;
      lastTime = now;
      knobVelocity *= Math.pow(0.85, dt / (1000 / 60));
      angle = ((angle + knobVelocity * dt) % 360 + 360) % 360;
      updateKnob();
      knobInertiaId = Math.abs(knobVelocity) > 0.01 ? requestAnimationFrame(step) : null;
    }
    knobInertiaId = requestAnimationFrame(step);
  }

  knob.addEventListener('mousedown', startKnobDrag);
  window.addEventListener('mousemove', onKnobDrag);
  window.addEventListener('mouseup', releaseKnobDrag);

  knob.addEventListener('touchstart', startKnobDrag, { passive: false });
  window.addEventListener('touchmove', onKnobDrag, { passive: false });
  window.addEventListener('touchend', releaseKnobDrag);

  knob.addEventListener('wheel', (e) => {
    e.preventDefault();
    angle = ((angle - e.deltaY * 0.3) % 360 + 360) % 360;
    updateKnob();
  }, { passive: false });

  function applyKnobInput() {
    const raw = parseFloat(knobDisplay.value);
    if (!isNaN(raw)) angle = ((raw * 2) % 360 + 360) % 360;
    knobDisplay.value = Math.round(((angle % 360) + 360) % 360 / 2) + '°';
    updateKnob();
  }

  knobDisplay.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { applyKnobInput(); knobDisplay.blur(); }
    if (e.key === 'Escape') { knobDisplay.blur(); }
  });
  knobDisplay.addEventListener('blur', applyKnobInput);
  knobDisplay.addEventListener('focus', () => {
    knobDisplay.value = Math.round(((angle % 360) + 360) % 360 / 2).toString();
    knobDisplay.select();
  });

  updateKnob();

  // ── Initialize glass shader ───────────────────────────────────────
  const imageArea   = document.querySelector('.image-area');
  const shaderImage = document.getElementById('shaderImage');

  function makeFallbackImage() {
    const c = document.createElement('canvas');
    c.width = 672; c.height = 378;
    const ctx = c.getContext('2d');
    const g = ctx.createLinearGradient(0, 0, 0, 378);
    g.addColorStop(0, 'rgba(0,0,0,1)');
    g.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, 672, 378);
    const img = new Image();
    img.src = c.toDataURL();
    return img;
  }

  function initShader(img) {
    imgAspect = img.naturalWidth / img.naturalHeight;
    imgOffsetX = 0; imgOffsetY = 0;
    try {
      shaderMount = new ShaderMount(imageArea, flutedGlassFragmentShader, {
        u_image:           img,
        u_fit:             shaderFit,
        u_angle:           0,
        u_size:            0.6,
        u_grainMixer:      0,
        u_grainOverlay:    0,
        u_shape:           GlassGridShapes.lines,
        u_shadows:         0.7,
        u_highlights:      0,
        u_distortion:      0.5,
        u_distortionShape: 4,
        u_colorBack:       [0, 0, 0, 0],
        u_colorShadow:     [0, 0, 0, 0.6],
        u_colorHighlight:  [1, 1, 1, 0],
        u_stretch:         0,
        u_blur:            0,
        u_edges:           0,
        u_shift:           0,
        u_rotation:        0,
        u_originX:         0.5,
        u_originY:         0.5,
        u_worldWidth:      0,
        u_worldHeight:     0,
        u_scale:           1,
        u_offsetX:         0,
        u_offsetY:         0,
        u_marginLeft:      0,
        u_marginRight:     0,
        u_marginTop:       0,
        u_marginBottom:    0,
      });
    } catch (e) {
      console.error('ShaderMount init failed:', e);
    }
  }

  function tryInitWithImage(img) {
    if (img.complete && img.naturalWidth > 0) {
      initShader(img);
    } else {
      img.addEventListener('load', () => initShader(img), { once: true });
      img.addEventListener('error', () => {
        const fb = makeFallbackImage();
        fb.onload = () => initShader(fb);
      }, { once: true });
    }
  }

  tryInitWithImage(shaderImage);

  // ── Fit/Fill control ──────────────────────────────────────────────
  const fitControl = document.getElementById('fitControl');
  const fitBtns = fitControl.querySelectorAll('.fit-btn');

  function applyFit(mode) {
    shaderFit = mode === 'fill' ? 2 : 1;
    imgOffsetX = 0; imgOffsetY = 0;
    imageArea.classList.toggle('fill-mode', mode === 'fill');
    fitBtns.forEach(btn => btn.classList.toggle('selected', btn.dataset.fit === mode));
    if (shaderMount) shaderMount.setUniforms({
      u_fit:     shaderFit,
      u_originX: 0.5,
      u_originY: 0.5,
      u_offsetX: 0,
      u_offsetY: 0,
    });
  }

  fitBtns.forEach(btn => btn.addEventListener('click', () => applyFit(btn.dataset.fit)));

  // ── Upload button ─────────────────────────────────────────────────
  const uploadBtn = document.querySelector('.upload-btn');
  const fileInput = document.createElement('input');
  fileInput.type = 'file';
  fileInput.accept = 'image/jpeg,image/png';
  fileInput.style.display = 'none';
  document.body.appendChild(fileInput);

  uploadBtn.addEventListener('click', () => fileInput.click());

  fileInput.addEventListener('change', () => {
    const file = fileInput.files[0];
    if (!file) return;
    const url = URL.createObjectURL(file);
    const img = new Image();
    img.src = url;
    img.addEventListener('load', () => {
      if (shaderMount) { shaderMount.dispose?.(); shaderMount = null; }
      imageArea.querySelectorAll('canvas').forEach(c => c.remove());
      if (activeFilter === 'dithering') {
        initDitherShader(img);
      } else {
        initShader(img);
      }
      uploadBtn.style.display = 'none';
      imageArea.classList.add('has-image');
      imageArea.classList.add('fill-mode'); // default is fill
      document.querySelector('.action-bar').classList.add('visible');
    }, { once: true });
    fileInput.value = '';
  });

  // ── Upload new button ──────────────────────────────────────────
  document.getElementById('uploadNewBtn').addEventListener('click', () => fileInput.click());

  // ── Save button ────────────────────────────────────────────────
  document.getElementById('saveBtn').addEventListener('click', () => {
    if (!shaderMount) return;
    const sourceImg = shaderMount.providedUniforms.u_image;
    if (!sourceImg) return;

    // Output at original image dimensions, capped at 4096px on the long side
    const nw = sourceImg.naturalWidth;
    const nh = sourceImg.naturalHeight;
    const scale = Math.min(1, 4096 / Math.max(nw, nh));
    const outW = Math.round(nw * scale);
    const outH = Math.round(nh * scale);

    // Hidden container sized exactly to output — minPixelRatio=1 so canvas = outW×outH
    const tempDiv = document.createElement('div');
    tempDiv.style.cssText = `position:fixed;left:-99999px;top:0;width:${outW}px;height:${outH}px;overflow:hidden`;
    document.body.appendChild(tempDiv);

    const saveShader = activeFilter === 'dithering' ? imageDitheringFragmentShader : flutedGlassFragmentShader;
    const tempMount = new ShaderMount(
      tempDiv, saveShader,
      { ...shaderMount.providedUniforms, u_fit: 1, u_offsetX: 0, u_offsetY: 0 },
      undefined, 0, 0, 1, outW * outH + 1
    );

    requestAnimationFrame(() => requestAnimationFrame(() => {
      const tempCanvas = tempDiv.querySelector('canvas');
      if (!tempCanvas) { tempMount.dispose?.(); tempDiv.remove(); return; }
      tempCanvas.toBlob(blob => {
        tempMount.dispose?.();
        tempDiv.remove();
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'neuropic.png';
        a.click();
        URL.revokeObjectURL(url);
      }, 'image/png');
    }));
  });

  // ── Fill-mode image drag ───────────────────────────────────────────
  let imgDragging = false;
  let imgDragStartX = 0, imgDragStartY = 0;
  let imgDragStartOffX = 0, imgDragStartOffY = 0;

  function fillDragBounds() {
    const rect = imageArea.getBoundingClientRect();
    const cw = rect.width, ch = rect.height;
    const canvasAspect = cw / ch;
    const imgBoxSizeX = Math.max(cw / imgAspect, ch) * imgAspect;
    const imgBoxSizeY = imgBoxSizeX / imgAspect;
    const scaleX = cw / imgBoxSizeX;
    const scaleY = ch / imgBoxSizeY;
    return {
      maxX: 0.5 * (1 - scaleX),
      maxY: 0.5 * (1 - scaleY),
    };
  }

  imageArea.addEventListener('pointerdown', (e) => {
    if (shaderFit !== 2) return; // fill mode only
    if (!imageArea.classList.contains('has-image')) return;
    if (e.target.closest('.fit-control') || e.target.closest('.upload-btn')) return;
    imgDragging = true;
    imgDragStartX = e.clientX;
    imgDragStartY = e.clientY;
    imgDragStartOffX = imgOffsetX;
    imgDragStartOffY = imgOffsetY;
    imageArea.classList.add('dragging-img');
    imageArea.setPointerCapture(e.pointerId);
  });

  imageArea.addEventListener('pointermove', (e) => {
    if (!imgDragging) return;
    const rect = imageArea.getBoundingClientRect();
    const dx = e.clientX - imgDragStartX;
    const dy = e.clientY - imgDragStartY;
    const { maxX, maxY } = fillDragBounds();
    imgOffsetX = Math.max(-maxX, Math.min(maxX, imgDragStartOffX + dx / rect.width));
    imgOffsetY = Math.max(-maxY, Math.min(maxY, imgDragStartOffY - dy / rect.height));
    if (shaderMount) shaderMount.setUniforms({ u_offsetX: imgOffsetX, u_offsetY: imgOffsetY });
  });

  imageArea.addEventListener('pointerup', () => {
    imgDragging = false;
    imageArea.classList.remove('dragging-img');
  });
</script>
</body>
</html>
