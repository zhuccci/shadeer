<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Glass Filter</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #202020;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Geist', 'Inter', sans-serif;
    }

    /* ── Filter panel ─────────────────────────────────────────── */
    .filter-panel {
      display: flex;
      flex-direction: column;
      gap: 16px;
      width: 624px;
    }

    /* ── Filter buttons row ───────────────────────────────────── */
    .filter-buttons {
      display: flex;
      gap: 16px;
    }

    .filter-btn {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      flex: 1;
      height: 97px;
      padding: 24px 8px;
      border-radius: 16px;
      border: 0.5px solid transparent;
      background: #434343;
      box-shadow: 0px 2px 10px 0px rgba(0,0,0,0.05);
      cursor: pointer;
      user-select: none;
    }

    .filter-btn:hover {
      border-color: #606060;
    }
    .filter-btn:hover .filter-icon {
      color: #fff679;
      filter: drop-shadow(0px 0px 8px rgba(255,246,121,0.6));
    }
    .filter-btn:hover .filter-label {
      color: #fff679;
    }

    .filter-btn.selected {
      background: #191919;
      border-color: #706f62;
      box-shadow: 0px 4px 12px 0px rgba(0,0,0,0.15);
    }
    .filter-btn.selected .filter-icon {
      color: #fff679;
      filter: drop-shadow(0px 0px 8px rgba(255,246,121,0.6));
    }
    .filter-btn.selected .filter-label {
      color: #fff679;
      text-shadow: 0px 0px 15px rgba(255,246,121,0.5);
    }
    .filter-btn.selected::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      box-shadow:
        inset -8px -8px 12px 0px rgba(19,19,19,0.16),
        inset  8px  8px 12px 0px rgba(19,19,19,0.16);
      pointer-events: none;
    }

    .filter-icon {
      width: 24px;
      height: 24px;
      flex-shrink: 0;
      color: #c7c7c7;
      transition: color 0.15s, filter 0.15s;
    }
    .filter-icon svg {
      display: block;
      width: 100%;
      height: 100%;
    }

    .filter-label {
      color: #c7c7c7;
      font-size: 16px;
      font-weight: 400;
      white-space: nowrap;
      transition: color 0.15s, text-shadow 0.15s;
    }

    /* ── Controls panel ───────────────────────────────────────── */
    .controls-panel {
      background: #202020;
      border: 0.5px solid #606060;
      border-radius: 16px;
      padding: 24px;
      display: flex;
      gap: 24px;
      align-items: flex-start;
      box-shadow:
        inset -8px -8px 12px 0px rgba(0,0,0,0.16),
        inset  8px  8px 12px 0px rgba(0,0,0,0.16);
    }

    /* ── Left column ──────────────────────────────────────────── */
    .controls-left {
      display: flex;
      flex-direction: column;
      gap: 32px;
      flex: 1;
      min-width: 0;
    }

    /* ── Shape selector ───────────────────────────────────────── */
    .widget-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .widget-label {
      color: #c7c7c7;
      font-size: 16px;
      font-weight: 500;
    }

    .selector {
      position: relative;
      background: #141414;
      border: 0.5px solid #262626;
      border-radius: 8px;
      padding: 8px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      user-select: none;
    }

    .selector-left {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .option-icon {
      width: 16px;
      height: 16px;
      display: block;
      flex-shrink: 0;
      filter: brightness(0) invert(78%);
    }

    .option-text {
      color: #c7c7c7;
      font-size: 16px;
      font-weight: 400;
    }

    .chevron {
      width: 24px;
      height: 24px;
      display: block;
      flex-shrink: 0;
      transition: transform 0.18s ease;
    }

    .selector.open .chevron {
      transform: rotate(180deg);
    }

    .dropdown {
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      right: 0;
      background: #141414;
      border: 0.5px solid #262626;
      border-radius: 8px;
      overflow: hidden;
      z-index: 10;
      display: none;
    }

    .selector.open .dropdown {
      display: block;
    }

    .dropdown-item {
      padding: 8px;
      display: flex;
      align-items: center;
      gap: 4px;
      cursor: pointer;
    }

    .dropdown-item:hover { background: #1c1c1c; }
    .dropdown-item.active { background: #1a1a1a; }

    .dropdown-item-text {
      color: #c7c7c7;
      font-size: 16px;
      font-weight: 400;
    }

    /* ── Slider ───────────────────────────────────────────────── */
    .slider-row {
      display: flex;
      gap: 16px;
      align-items: center;
    }

    .slider-container {
      display: flex;
      flex-direction: column;
      gap: 4px;
      flex: 1;
      min-width: 0;
    }

    .slider-label {
      color: #d6d6d6;
      font-size: 16px;
      font-weight: 500;
    }

    .slider-track {
      display: flex;
      align-items: center;
      width: 100%;
      user-select: none;
    }

    .track-fill {
      height: 6px;
      border-radius: 40px 0 0 40px;
      flex-shrink: 0;
      background: #fff679;
      width: 0;
    }

    .slider-thumb {
      width: 6px;
      height: 12px;
      border-radius: 4px;
      flex-shrink: 0;
      background: #fff679;
      box-shadow: -2px 0 8px 0 rgba(0,0,0,0.25);
      position: relative;
      z-index: 1;
    }

    .track-empty {
      height: 6px;
      border-radius: 0 40px 40px 0;
      background: #6a6a6a;
      flex: 1;
      min-width: 0;
    }

    .value-display {
      background: #141414;
      border: 0.5px solid #262626;
      border-radius: 8px;
      padding: 8px 16px;
      color: #c7c7c7;
      font-size: 16px;
      font-weight: 500;
      width: 62px;
      text-align: center;
      outline: none;
      font-family: inherit;
      flex-shrink: 0;
    }
    .value-display:focus { border-color: #555; }

    /* ── Right column — knob ──────────────────────────────────── */
    .controls-right {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 4px;
      flex-shrink: 0;
    }

    .knob-label {
      color: #c7c7c7;
      font-size: 16px;
      font-weight: 400;
    }

    .dial-wrap {
      position: relative;
      width: 152px;
      height: 132px;
    }

    .deg-top, .deg-bottom {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      font-size: 8px;
      line-height: 1;
      color: #595959;
      text-align: center;
      white-space: nowrap;
      user-select: none;
      padding-left: 3px;
    }
    .deg-top { top: 2px; padding-left: 4px; }
    .deg-bottom { bottom: 2px; }

    .deg-left, .deg-right {
      position: absolute;
      font-size: 8px;
      color: #595959;
      top: 66px;
      transform: translateY(-50%);
      text-align: center;
      user-select: none;
      width: 22px;
    }
    .deg-left { left: 0; }
    .deg-right { left: 130px; }

    .knob-area {
      position: absolute;
      left: 26px;
      top: 16px;
      width: 100px;
      height: 100px;
    }

    .knob {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      border: 0.625px solid #262626;
      background: radial-gradient(circle at center, #202020 0%, #191919 100%);
      position: relative;
      cursor: grab;
      user-select: none;
    }
    .knob:active { cursor: grabbing; }

    .tick {
      position: absolute;
      border-radius: 20px;
      pointer-events: none;
    }

    .indicator {
      position: absolute;
      width: 7.5px;
      height: 7.5px;
      background: #fff679;
      border-radius: 50%;
      box-shadow: 0 0 18.75px 6.25px rgba(255,246,121,0.2);
      pointer-events: none;
    }

    .knob-value-display {
      background: #141414;
      border: 0.5px solid #262626;
      border-radius: 8px;
      padding: 8px 10px 8px 14px;
      color: #c7c7c7;
      font-size: 16px;
      font-weight: 500;
      width: 82px;
      text-align: center;
      outline: none;
      font-family: inherit;
    }
    .knob-value-display:focus { border-color: #555; }
  </style>
</head>
<body>

<div class="filter-panel">

        </svg>

    <!-- Halftone -->
    <div class="filter-btn">
      <div class="filter-icon">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">

    <!-- Granny -->
    <div class="filter-btn">

  </div>

  <!-- Controls panel -->
  <div class="controls-panel">

    <!-- Left column -->
    <div class="controls-left">

      <!-- Shape selector -->
      <div class="widget-group">
        <span class="widget-label">Shape</span>
        <div class="selector" id="selector">
          <div class="selector-left">
            <img class="option-icon" id="selectedIcon" src="" alt="" />
            <span class="option-text" id="selectedText"></span>
          </div>
          <img class="chevron" src="icons/chevron-down.svg" alt="" />
          <div class="dropdown" id="dropdown">
            <div class="dropdown-item" data-value="wave">
              <img class="option-icon" src="icons/haptic.svg" alt="" />
              <span class="dropdown-item-text">Wave</span>
            </div>
            <div class="dropdown-item" data-value="zigzag">
              <img class="option-icon" src="icons/zigzag.svg" alt="" />
              <span class="dropdown-item-text">Zigzag</span>
            </div>
          </div>
        </div>
      </div>

      <!-- Size slider -->
      <div class="widget-group">
        <div class="slider-row">
          <div class="slider-container">
            <div class="slider-label">Size</div>
            <div class="slider-track" id="sizeTrack">
              <div class="track-fill" id="sizeFill"></div>
              <div class="slider-thumb" id="sizeThumb"></div>
              <div class="track-empty"></div>
            </div>
          </div>
          <input class="value-display" id="sizeDisplay" type="text" value="60" />
        </div>
      </div>

      <!-- Grain slider -->
      <div class="widget-group">
        <div class="slider-row">
          <div class="slider-container">
            <div class="slider-label">Grain</div>
            <div class="slider-track" id="grainTrack">
              <div class="track-fill" id="grainFill"></div>
              <div class="slider-thumb" id="grainThumb"></div>
              <div class="track-empty"></div>
            </div>
          </div>
          <input class="value-display" id="grainDisplay" type="text" value="0" />
        </div>
      </div>

    </div>

    <!-- Right column — angle knob -->
    <div class="controls-right">
      <span class="knob-label">Angle</span>
      <div class="dial-wrap">
        <span class="deg-top">0°</span>
        <span class="deg-left">270°</span>
        <span class="deg-right">90°</span>
        <span class="deg-bottom">180°</span>
        <div class="knob-area">
          <div class="knob" id="knob">
            <div style="
              position: absolute;
              width: 80px; height: 80px;
              left: 10px; top: 10px;
              border-radius: 50%;
              background: linear-gradient(to bottom, #656565, #515151);
              box-shadow: 0 1px 1px rgba(255,255,255,0.04), inset 0 2.5px 6.25px rgba(255,255,255,0.1);
              pointer-events: none;
            "></div>
            <div class="indicator" id="indicator"></div>
          </div>
        </div>
      </div>
      <input class="knob-value-display" id="knobDisplay" type="text" value="0°" />
    </div>

  </div>
</div>

<script>
  // ── Filter buttons ────────────────────────────────────────────
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
    });
  });

  // ── Shape selector ────────────────────────────────────────────
  const selector     = document.getElementById('selector');
  const selectedIcon = document.getElementById('selectedIcon');
  const selectedText = document.getElementById('selectedText');
  const dropdown     = document.getElementById('dropdown');
  const dropItems    = dropdown.querySelectorAll('.dropdown-item');

  const shapeOptions = {
    wave:   { label: 'Wave',   icon: 'icons/haptic.svg' },
    zigzag: { label: 'Zigzag', icon: 'icons/zigzag.svg' },
  };

  function applyShape(value) {
    selectedIcon.src = shapeOptions[value].icon;
    selectedText.textContent = shapeOptions[value].label;
    dropItems.forEach(item => item.classList.toggle('active', item.dataset.value === value));
  }

  selector.addEventListener('click', (e) => {
    if (e.target.closest('.dropdown-item')) return;
    selector.classList.toggle('open');
  });

  dropItems.forEach(item => {
    item.addEventListener('click', () => {
      applyShape(item.dataset.value);
      selector.classList.remove('open');
    });
  });

  document.addEventListener('click', (e) => {
    if (!selector.contains(e.target)) selector.classList.remove('open');
  });

  applyShape('wave');

  // ── Slider factory ────────────────────────────────────────────
  function makeSlider({ trackEl, fillEl, thumbEl, displayEl, initialValue }) {
    const MIN = 0, MAX = 100;
    const THUMB_W = 6;
    let value = initialValue;
    let dragging = false, hovered = false, pressed = false;
    let dragStartX = 0, dragStartValue = 0;
    let trackWidth = 0;

    function rangeW() {
      trackWidth = trackEl.getBoundingClientRect().width || trackEl.offsetWidth;
      return trackWidth - THUMB_W;
    }

    function clamp(v) { return Math.max(MIN, Math.min(MAX, v)); }

    function thumbColor() {
      if (value === 0)  return '#a6a6a6';
      if (pressed)      return '#9D9635';
      if (hovered)      return '#C7BE44';
      return '#fff679';
    }

    function updateVisuals() {
      const inactive = value === 0;
      const rw = rangeW();
      const norm = value / MAX;
      fillEl.style.background = inactive ? '#6a6a6a' : '#fff679';
      fillEl.style.width = inactive ? '2px' : (norm * rw) + 'px';
      thumbEl.style.background = thumbColor();
      if (dragging || document.activeElement !== displayEl) {
        displayEl.value = Math.round(value).toString();
      }
    }

    function valueFromClientX(clientX) {
      const rect = trackEl.getBoundingClientRect();
      const x = clientX - rect.left - THUMB_W / 2;
      return clamp((x / rangeW()) * MAX);
    }

    thumbEl.addEventListener('mouseenter', () => { hovered = true;  updateVisuals(); });
    thumbEl.addEventListener('mouseleave', () => { hovered = false; updateVisuals(); });

    thumbEl.addEventListener('mousedown', (e) => {
      e.preventDefault();
      pressed = true; dragging = true;
      dragStartX = e.clientX; dragStartValue = value;
      updateVisuals();
    });

    window.addEventListener('mousemove', (e) => {
      if (!dragging) return;
      const rw = rangeW();
      value = clamp(dragStartValue + ((e.clientX - dragStartX) / rw) * MAX);
      updateVisuals();
    });

    window.addEventListener('mouseup', () => {
      pressed = false; dragging = false;
      updateVisuals();
    });

    trackEl.addEventListener('click', (e) => {
      if (e.target === thumbEl) return;
      value = valueFromClientX(e.clientX);
      updateVisuals();
    });

    trackEl.addEventListener('wheel', (e) => {
      e.preventDefault();
      value = clamp(value - e.deltaY * 0.2);
      updateVisuals();
    }, { passive: false });

    thumbEl.addEventListener('touchstart', (e) => {
      e.preventDefault();
      dragging = true;
      dragStartX = e.touches[0].clientX; dragStartValue = value;
    }, { passive: false });

    window.addEventListener('touchmove', (e) => {
      if (!dragging) return;
      e.preventDefault();
      value = clamp(dragStartValue + ((e.touches[0].clientX - dragStartX) / rangeW()) * MAX);
      updateVisuals();
    }, { passive: false });

    window.addEventListener('touchend', () => { dragging = false; });

    function applyInput() {
      const raw = parseFloat(displayEl.value);
      if (!isNaN(raw)) value = clamp(raw);
      updateVisuals();
    }

    displayEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { applyInput(); displayEl.blur(); }
      if (e.key === 'Escape') { displayEl.blur(); }
    });
    displayEl.addEventListener('blur', applyInput);
    displayEl.addEventListener('focus', () => {
      displayEl.value = Math.round(value).toString();
      displayEl.select();
    });

    updateVisuals();
  }

  makeSlider({
    trackEl: document.getElementById('sizeTrack'),
    fillEl:  document.getElementById('sizeFill'),
    thumbEl: document.getElementById('sizeThumb'),
    displayEl: document.getElementById('sizeDisplay'),
    initialValue: 60,
  });

  makeSlider({
    trackEl: document.getElementById('grainTrack'),
    fillEl:  document.getElementById('grainFill'),
    thumbEl: document.getElementById('grainThumb'),
    displayEl: document.getElementById('grainDisplay'),
    initialValue: 0,
  });

  // ── Angle knob ────────────────────────────────────────────────
  const knob        = document.getElementById('knob');
  const indicator   = document.getElementById('indicator');
  const knobDisplay = document.getElementById('knobDisplay');

  const KNOB_R    = 50;
  const GREY_R    = 40;
  const IND_R     = GREY_R - 3.75 - 2.5;
  const TICK_R    = 45;
  const TICK_STEP = 15;
  const TICK_COUNT = 360 / TICK_STEP;

  let angle = 0;
  let knobDragging = false;
  let knobCenter = { x: 0, y: 0 };
  let dragStartMouseAngle = 0, dragStartKnobAngle = 0;

  const ticks = [];
  for (let i = 0; i < TICK_COUNT; i++) {
    const deg = i * TICK_STEP;
    const rad = (deg - 90) * Math.PI / 180;
    const x = Math.cos(rad) * TICK_R;
    const y = Math.sin(rad) * TICK_R;
    const isCardinal = deg % 90 === 0;
    const size = isCardinal ? 2.5 : 2.434;
    const el = document.createElement('div');
    el.className = 'tick';
    el.style.width  = size + 'px';
    el.style.height = size + 'px';
    el.style.left   = (KNOB_R + x - size / 2) + 'px';
    el.style.top    = (KNOB_R + y - size / 2) + 'px';
    knob.appendChild(el);
    ticks.push({ el, deg });
  }

  function updateKnob() {
    const norm = ((angle % 360) + 360) % 360;
    const indRad = (angle - 90) * Math.PI / 180;
    indicator.style.left = (KNOB_R + Math.cos(indRad) * IND_R - 3.75) + 'px';
    indicator.style.top  = (KNOB_R + Math.sin(indRad) * IND_R - 3.75) + 'px';
    ticks.forEach(({ el, deg }) => {
      const lit = deg <= norm;
      el.style.background = lit ? '#fff679' : '#2b2b2b';
      el.style.boxShadow  = 'none';
    });
    if (document.activeElement !== knobDisplay)
      knobDisplay.value = Math.round(norm) + '°';
  }

  function angleFromEvent(e) {
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    return Math.atan2(clientY - knobCenter.y, clientX - knobCenter.x) * 180 / Math.PI + 90;
  }

  function startKnobDrag(e) {
    e.preventDefault();
    const rect = knob.getBoundingClientRect();
    knobCenter = { x: rect.left + rect.width / 2, y: rect.top + rect.height / 2 };
    knobDragging = true;
    dragStartMouseAngle = angleFromEvent(e);
    dragStartKnobAngle  = angle;
  }

  function onKnobDrag(e) {
    if (!knobDragging) return;
    e.preventDefault();
    let delta = angleFromEvent(e) - dragStartMouseAngle;
    if (delta >  180) delta -= 360;
    if (delta < -180) delta += 360;
    angle = ((dragStartKnobAngle + delta) % 360 + 360) % 360;
    updateKnob();
  }

  knob.addEventListener('mousedown', startKnobDrag);
  window.addEventListener('mousemove', onKnobDrag);
  window.addEventListener('mouseup', () => { knobDragging = false; });

  knob.addEventListener('touchstart', startKnobDrag, { passive: false });
  window.addEventListener('touchmove', onKnobDrag, { passive: false });
  window.addEventListener('touchend', () => { knobDragging = false; });

  knob.addEventListener('wheel', (e) => {
    e.preventDefault();
    angle = ((angle - e.deltaY * 0.3) % 360 + 360) % 360;
    updateKnob();
  }, { passive: false });

  function applyKnobInput() {
    const raw = parseFloat(knobDisplay.value);
    if (!isNaN(raw)) angle = ((raw % 360) + 360) % 360;
    knobDisplay.value = Math.round(((angle % 360) + 360) % 360) + '°';
    updateKnob();
  }

  knobDisplay.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { applyKnobInput(); knobDisplay.blur(); }
    if (e.key === 'Escape') { knobDisplay.blur(); }
  });
  knobDisplay.addEventListener('blur', applyKnobInput);
  knobDisplay.addEventListener('focus', () => {
    knobDisplay.value = Math.round(((angle % 360) + 360) % 360).toString();
    knobDisplay.select();
  });

  updateKnob();
</script>
</body>
</html>
