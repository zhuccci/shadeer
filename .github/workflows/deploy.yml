name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write
  deployments: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cancel stuck deployment
        uses: actions/github-script@v7
        with:
          script: |
            const stuckSha = 'c0834c331b8bb3d8bb3ff3931376a7e6faccc9ac';
            const { data } = await github.rest.repos.listDeployments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: stuckSha,
              per_page: 10,
            });
            console.log(`Found ${data.length} deployments for stuck SHA`);
            for (const d of data) {
              console.log(`  id=${d.id} env=${d.environment} sha=${d.sha.slice(0,7)}`);
              await github.rest.repos.createDeploymentStatus({
                owner: context.repo.owner,
                repo: context.repo.repo,
                deployment_id: d.id,
                state: 'inactive',
              });
              console.log(`  → marked inactive`);
            }

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - id: deployment
        uses: actions/deploy-pages@v4
