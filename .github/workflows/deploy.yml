name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write
  deployments: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cancel previous Pages deployments
        uses: actions/github-script@v7
        with:
          script: |
            try {
              const { data } = await github.request('GET /repos/{owner}/{repo}/pages/deployments', {
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 10,
              });
              for (const d of data) {
                if (d.status_url && d.status_url.includes(context.sha)) continue;
                try {
                  await github.request('POST /repos/{owner}/{repo}/pages/deployments/{deployment_id}/cancel', {
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    deployment_id: d.id,
                  });
                  console.log(`Cancelled Pages deployment ${d.id}`);
                } catch(e) { console.log(`Could not cancel ${d.id}: ${e.message}`); }
              }
            } catch(e) { console.log(`List failed: ${e.message}`); }

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - id: deployment
        uses: actions/deploy-pages@v4
