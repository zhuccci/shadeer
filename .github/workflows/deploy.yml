name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write
  deployments: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cancel in-progress Pages deployments
        uses: actions/github-script@v7
        with:
          script: |
            try {
              const { data } = await github.request('GET /repos/{owner}/{repo}/pages/deployments', {
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 10,
              });
              console.log('Found deployments:', JSON.stringify(data.map(d => ({id: d.id, status: d.status}))));
              for (const d of data) {
                if (d.status === 'in_progress') {
                  try {
                    await github.request('POST /repos/{owner}/{repo}/pages/deployments/{deployment_id}/cancel', {
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      deployment_id: d.id,
                    });
                    console.log(`Cancelled ${d.id}`);
                  } catch(e) { console.log(`Could not cancel ${d.id}: ${e.message}`); }
                }
              }
            } catch(e) { console.log(`Failed: ${e.message}`); }

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - id: deployment
        uses: actions/deploy-pages@v4
